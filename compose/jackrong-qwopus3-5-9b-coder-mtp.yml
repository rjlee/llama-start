services:
  llama-server:
    image: ik-llama-cpp:cu13-server-local
    container_name: llama-server
    restart: unless-stopped
    ports:
    - 8080:8080
    volumes:
    - /models:/models
    - /root/docker/club-3090/models/qwen3.6-35b-a3b/ik-llama/patches/apex-qwen-chat-template.jinja:/etc/apex-qwen-chat-template.jinja:ro
    - /usr/lib/x86_64-linux-gnu/libcuda.so.1:/app/lib/libcuda.so.1
    - /usr/lib/x86_64-linux-gnu/libcuda.so.${NVIDIA_DRIVER_VER}:/app/lib/libcuda.so.${NVIDIA_DRIVER_VER}
    - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/app/lib/libnvidia-ml.so.1
    - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.${NVIDIA_DRIVER_VER}:/app/lib/libnvidia-ml.so.${NVIDIA_DRIVER_VER}
    - /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1:/app/lib/libnvidia-ptxjitcompiler.so.1
    - /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.${NVIDIA_DRIVER_VER}:/app/lib/libnvidia-ptxjitcompiler.so.${NVIDIA_DRIVER_VER}
    devices:
    - /dev/nvidia0:/dev/nvidia0
    - /dev/nvidiactl:/dev/nvidiactl
    - /dev/nvidia-uvm:/dev/nvidia-uvm
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - -m
    - /models/Qwopus3.5-9B-Coder-MTP-Q4_K_M.gguf
    - --ctx-size
    - '262144'
    - -b
    - '4096'
    - -ub
    - '1024'
    - --cache-ram
    - '4096'
    - --cache-type-k
    - q8_0
    - --cache-type-v
    - q5_0
    - -np
    - '1'
    - -ngl
    - '99'
    - --slot-save-path
    - /tmp
    - --spec-type
    - mtp:n_max=4,p_min=0.0
    - --recurrent-ckpt-mode
    - auto
    - --merge-qkv
    - -fa
    - 'on'
    - --jinja
    - --chat-template-file
    - /etc/apex-qwen-chat-template.jinja
    - --parallel-tool-calls
    - --reasoning
    - 'off'
    - --reasoning-format
    - deepseek
    - --temp
    - '0.6'
    - --top-p
    - '0.95'
    - --top-k
    - '20'
    - --min-p
    - '0.0'
    - --repeat-penalty
    - '1.0'
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:8080/health
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 180s
