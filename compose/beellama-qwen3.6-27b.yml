services:
  llama-server:
    image: ghcr.io/anbeeld/beellama.cpp:server-cuda13
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${MODELS_DIR:-/models}:/models
      - /root/docker/club-3090/models/qwen3.6-35b-a3b/ik-llama/patches/apex-qwen-chat-template.jinja:/etc/apex-qwen-chat-template.jinja:ro
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -m
      - ${MODELS_DIR:-/models}/Qwen3.6-27B-Q4_K_M.gguf
      - --spec-draft-model
      - ${MODELS_DIR:-/models}/Qwen3.6-27B-DFlash-Q4_K_M.gguf
      - --spec-type
      - dflash
      - --spec-dflash-cross-ctx
      - "1024"
      - --spec-draft-ngl
      - all
      - -ngl
      - all
      - --ctx-size
      - "131072"
      - -b
      - "2048"
      - -ub
      - "512"
      - -np
      - "1"
      - --kv-unified
      - --cache-type-k
      - q5_0
      - --cache-type-v
      - q4_1
      - --flash-attn
      - "on"
      - --cache-ram
      - "0"
      - --jinja
      - --chat-template-file
      - /etc/apex-qwen-chat-template.jinja
      - --no-host
      - --temp
      - "0.6"
      - --top-k
      - "20"
      - --top-p
      - "0.95"
      - --min-p
      - "0.0"
      - --repeat-penalty
      - "1.0"
      - --slot-save-path
      - "/tmp"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
